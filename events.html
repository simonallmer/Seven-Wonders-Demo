<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Seven Wonders</title>
    <meta name="description" content="Official events and tournaments for the Seven Wonders game series">
    <link rel="stylesheet" href="style.css">
    <style>
        .lock-container {
            max-width: 600px;
            margin: 80px auto;
            padding: 20px;
            text-align: center;
        }

        .lock-card {
            background: linear-gradient(135deg, #1a1612 0%, #110f0d 100%);
            border: 1px solid rgba(197, 160, 89, 0.4);
            border-radius: 4px;
            padding: 60px 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .lock-title {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: #E3DAC9;
            letter-spacing: 0.15em;
            margin-bottom: 25px;
        }

        .lock-message {
            font-size: 0.9rem;
            color: rgba(227, 218, 201, 0.7);
            line-height: 1.8;
            margin-bottom: 35px;
            letter-spacing: 0.05em;
        }

        .subscribe-btn {
            display: inline-block;
            padding: 14px 40px;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 700;
            color: #0d0b09;
            background: #C5A059;
            border: none;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .subscribe-btn:hover {
            background: #d4b06a;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3);
        }

        .back-link-custom {
            display: inline-block;
            margin-top: 30px;
            color: rgba(197, 160, 89, 0.6);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }

        .back-link-custom:hover {
            color: #C5A059;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-link">← Menu</a>

    <div class="container">
        <header class="main-header">
            <h1 class="title">EVENTS</h1>
        </header>

        <div class="lock-container">
            <div class="lock-card">
                <h2 class="lock-title">EVENTS LOCKED</h2>
                <p class="lock-message">
                    Attend regular Seven Wonders events in cities around the world with an Arcade Subscription.
                </p>
                <a href="https://simonallmer.com/sevenwondersarcade" target="_blank" rel="noopener noreferrer" class="subscribe-btn">Learn More</a>
                <br>
                <a href="index.html" class="back-link-custom">← Back to Menu</a>
            </div>
        </div>

        <footer class="copyright">
            <p><a href="https://sevenwondersgames.com" style="color: inherit; text-decoration: none;">SevenWondersGames.com</a></p>
            <p>&copy; 2020-2026 Simon Allmer Entertainment</p>
        </footer>
    </div>
</body>

</html>
